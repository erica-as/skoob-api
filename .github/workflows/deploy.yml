name: Pipeline de CI/CD - Skoob API

# O pipeline será disparado sempre que houver um commit ou pull request na ramificação principal (main)
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ==========================================
  # 1. ETAPA DE COMMIT & COMPILAÇÃO (BUILD)
  # ==========================================
  build-and-compile:
    name: Compilação (Build) da Aplicação
    runs-on: ubuntu-latest

    steps:
      - name: Código fonte do repositório
        uses: actions/checkout@v4

      - name: Configurar o ambiente .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restaurar dependências (Nuget)
        run: dotnet restore SkoobApi.slnx

      - name: Compilar a Solução (Build)
        run: dotnet build SkoobApi.slnx --configuration Release --no-restore

  # ==========================================
  # 2. SUÍTE DE TESTES AUTOMATIZADOS (CI)
  # ==========================================
  run-tests:
    name: Executar Suíte de Testes Automatizados
    runs-on: ubuntu-latest
    needs: build-and-compile # Só inicia se a compilação passar

    steps:
      - name: Código fonte do repositório
        uses: actions/checkout@v4

      - name: Configurar o ambiente .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Executar Testes (Unidade, Integração e Aceitação)
        run: dotnet test SkoobApi.slnx --configuration Release --logger "trx;LogFileName=test-results.trx"

      - name: Publicar Resultados dos Testes (Artefato)
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-de-testes
          path: "**/TestResults/*.trx"
          if-no-files-found: warn

  # ==========================================
  # 3. ETAPA DE LANÇAMENTO (DEPLOY)
  # ==========================================
  deploy-application:
    name: Entrega e Implantação do Sistema
    runs-on: ubuntu-latest
    needs: run-tests # Só faz o deploy se TODOS os testes automatizados passarem
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' # Apenas envia se for um commit direto na main

    steps:
      - name: Código fonte do repositório
        uses: actions/checkout@v4
      
      # Abordagem A: Disparo de deploy automático no servidor gratuito (Render) via Deploy Hook
      - name: Disparar Deploy no Render (Servidor Gratuito)
        run: |
          echo "Iniciando a implantação automatizada na nuvem do Render..."
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Script de Implantação concluído com sucesso!"